# =============================================================================
# LIASSE FISCALE — Mapping des préfixes PCG vers les postes des états
# financiers (Bilan cerfa 2050/2051, Tréso, AACE, EBIT cerfa 2052,
# P&L détaillé cerfa 2052/2053).
# Le YAML ne stocke QUE les LISTES de préfixes. Les signes de présentation
# (× -1 pour le passif) et les conditions de filtrage sur le signe du solde
# (">0" / "<0") restent dans le code (logique générique de fm_writer.py).
# Sections ebit et pl_detaille : remplies par les prompts 9 et 10.
# =============================================================================
liasse_fiscale:

  bilan:
    actif:
      capital_souscrit_non_appele: ["109"]
      immo_incorp: ["201", "203", "205", "206", "207", "208", "232", "237",
                    "280", "290"]
      immo_corp: ["211", "212", "213", "214", "215", "218", "231", "238",
                  "281", "291"]
      immo_fi: ["261", "266", "267", "268", "271", "272", "273", "274",
                "275", "276", "277", "296", "297"]
      stocks: ["31", "32", "33", "34", "35", "37", "39"]
      avances_acomptes_verses: ["4091"]
      creances_clients: ["411", "413", "416", "418", "491"]
      # 425, 444, 451, 455, 456, 467, 478 retirés — gérés par comptes_bascule
      autres_creances: ["4096", "4097", "4098", "441", "4456", "462",
                        "465", "471"]
      vmp: ["50", "590"]
      disponibilites: ["51", "53"]
      # CCA (486) géré dynamiquement par comptes_bascule — liste vide voulue
      cca: []
    passif:
      capital: ["101", "108"]
      primes: ["104"]
      reserve_legale: ["1061"]
      autres_reserves: ["1062", "1063", "1064", "1068"]
      report_nouveau: ["11"]
      resultat_exercice: ["12"]
      # Résultat en cours (classes 6 & 7 si exercice non clôturé)
      resultat_en_cours: ["6", "7"]
      subventions: ["13"]
      prov_reglementees: ["14"]
      prov_risques: ["151"]
      prov_charges: ["152", "153", "154", "155", "156", "157", "158"]
      emprunts: ["16", "17", "519"]
      dettes_fournisseurs: ["401", "403", "4081", "4088"]
      # 444 retiré (double-comptage) — géré par comptes_bascule
      dettes_fiscales_sociales: ["421", "422", "423", "424", "427", "428",
                                 "43", "442", "4455", "4457", "446", "447",
                                 "448", "449", "457"]
      # 467, 478, 509 retirés — gérés par comptes_bascule
      autres_dettes: ["4191", "404", "405", "4084", "4196", "4197",
                      "4198", "464"]
      # PCA (487) géré dynamiquement par comptes_bascule — liste vide voulue
      pca: []
    comptes_bascule:
      # Reclassement dynamique actif/passif selon le signe du solde
      prefixes: ["425", "443", "444", "451", "455", "456",
                 "467", "478", "486", "487", "509"]
      # Sous-totaux interco affichés séparément (sous-ensemble des bascules,
      # filtré ">0" côté actif et "<0" côté passif dans le code)
      interco: ["451", "455"]

  treso:
    ressources_stables:
      capitaux_propres: ["10", "11", "12", "13", "14"]
      amort_dep: ["28", "29", "39", "49"]
      prov_risques: ["15"]
      dettes_financieres_mlt: ["16", "17"]
    emplois_stables:
      actif_immobilise_brut: ["20", "21", "22", "23", "24", "25", "26", "27"]
    actif_circulant_exploitation:
