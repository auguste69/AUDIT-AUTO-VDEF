# (sans le préfixe 20XX_XX_YYY_ ni l'extension). Arbitrages figés
# (révision 09/06/2026) :
#   - I_Immobilisations corp reçoit I Corp0 ET I Incorp0 (confirmé cabinet) ;
#   - I_Immobilisations incorporelles ne reçoit AUCUNE feuille FM (copie,
#     renommage et placeholders uniquement) ;
#   - A_Fournisseurs-Achats reçoit [AACE, A0] ; F_Financement [Tréso, F0].
