      dettes_fournisseurs: ["401", "403", "408"]
      # Condition "<0" appliquée dans le code
      dettes_fiscales_sociales: ["42", "43", "44"]
      # Condition "<0" appliquée dans le code
      autres_dettes: ["46", "47"]
      pca: ["487"]
    tresorerie_directe:
      # Condition ">0" appliquée dans le code
      tresorerie_active: ["50", "51", "53"]
      tresorerie_passive_519: ["519"]
      # Condition "<0" appliquée dans le code
