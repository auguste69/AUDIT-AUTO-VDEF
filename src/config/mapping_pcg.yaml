# =============================================================================
# MAPPING PCG EXHAUSTIF — Plan Comptable Général français
# =============================================================================
# Couvre TOUS les numéros de comptes possibles (classes 1 à 7)
#
# Logique de résolution (du plus spécifique au plus général) :
#   1. Surcharges cabinet (section en bas)
#   2. Préfixe 3 chiffres (ex: "486" → A)
#   3. Préfixe 2 chiffres (ex: "48" → T)
#   4. Classe 1 chiffre — fallback garanti, tout compte matche
#
# Les préfixes plus longs SURCHARGENT les plus courts.
# Exemple : "48" → T, mais "486" → A et "487" → V
#
# Le mapping du FM existant du client est TOUJOURS prioritaire
# sur cette config (il prime sur tout, y compris les surcharges).
# =============================================================================

