# =============================================================================
# RAPPROCHEMENT DES COMPTES N / N-1 (P6 — account_matcher)
# =============================================================================
# Un compte peut changer de numéro entre deux exercices (ex: 512003 →
# 5123001). Le matcher propose des rapprochements entre comptes orphelins,
# scorés par préfixe commun, similarité de libellé, cycle et classification
# bilan. Le seuil sert UNIQUEMENT à proposer : aucune fusion sans
# confirmation explicite de l'utilisateur (CLI interactive, UI Streamlit
# ou option --rapprochements-auto).
rapprochements:
  # Score minimal pour PROPOSER un rapprochement (jamais pour fusionner seul)
  seuil: 0.5
  # Un compte collectif court (≤ longueur_collectif chiffres, ex. "401",
  # "411" issus des À-NOUVEAU sur compte collectif) ne doit jamais être
  # rapproché d'un compte de détail long (8 chiffres) : populations de
  # granularité différente (un total agrégé n'est pas un changement de
  # numéro). Ce garde-fou évite des fusions collectif↔détail erronées.
  longueur_collectif: 3
  # Poids des composantes du score composite (somme = 1.0)
  poids:
    prefixe: 0.40
    libelle: 0.35
    cycle: 0.15
    classification: 0.10
  # Mots ignorés dans la comparaison des libellés (insensible à la casse)
  mots_vides: ["le", "la", "les", "l", "de", "du", "des", "d", "et",
               "a", "au", "aux", "en", "sur", "un", "une", "pour",
               "compte", "comptes", "divers", "diverses"]

