      autres_creances: ["4096", "4097", "4098", "441", "4456", "462",
                        "465", "471"]
      # 501-508 énumérés (PAS "50") : 509 est un compte bascule — le
      # préfixe "50" le compterait une seconde fois. "59" = dépréciations.
      vmp: ["501", "502", "503", "504", "505", "506", "507", "508", "59"]
      # 51x énumérés (PAS "51") : 517 et 519 sont au passif (emprunts),
      # 512 est conditionnel (créditeur → emprunts). ">0" appliqué au 512
      # via disponibilites_cond dans le code.
      disponibilites: ["511", "513", "514", "515", "516", "518", "53"]
      disponibilites_cond: ["512"]
      # CCA (486) géré dynamiquement par comptes_bascule — liste vide voulue.
      # Charges à répartir (481) : idem, capturé via comptes_bascule (débiteur
      # → actif). Le total_actif synthétique somme bascule_actif, pas ce champ.
      cca: []
    passif:
      capital: ["101", "108"]
      primes: ["104"]
      reserve_legale: ["1061"]
      autres_reserves: ["1062", "1063", "1064", "1068"]
      report_nouveau: ["11"]
      resultat_exercice: ["12"]
      # Résultat en cours (classes 6 & 7 si exercice non clôturé)
      resultat_en_cours: ["6", "7"]
      subventions: ["13"]
      prov_reglementees: ["14"]
      prov_risques: ["151"]
      prov_charges: ["152", "153", "154", "155", "156", "157", "158"]
      # 517 (autres organismes) et 519 (CBC) au passif par convention
      # cerfa 2051 ; 512 créditeur reclassé ici via emprunts_cond ("<0"
      # appliqué dans le code).
      emprunts: ["16", "17", "517", "519"]
      emprunts_cond: ["512"]
      dettes_fournisseurs: ["401", "403", "4081", "4088"]
      # 444 retiré (double-comptage) — géré par comptes_bascule
      dettes_fiscales_sociales: ["421", "422", "423", "424", "427", "428",
                                 "43", "442", "4455", "4457", "446", "447",
                                 "448", "449", "457"]
      # 467, 478, 509 retirés — gérés par comptes_bascule
      autres_dettes: ["4191", "404", "405", "4084", "4196", "4197",
                      "4198", "464"]
      # PCA (487) géré dynamiquement par comptes_bascule — liste vide voulue
      pca: []
    comptes_bascule:
      # Reclassement dynamique actif/passif selon le signe du solde
      prefixes: ["425", "443", "444", "451", "455", "456",
                 "467", "472", "473", "474", "475", "476", "477", "478",
                 "481", "486", "487", "509"]
      # Sous-totaux interco affichés séparément (sous-ensemble des bascules,
      # filtré ">0" côté actif et "<0" côté passif dans le code)
      interco: ["451", "455"]

  # La cohérence TN = FRNG − BFR = trésorerie directe exige que CHAQUE
  # compte hors trésorerie soit capturé par exactement UNE rubrique.
  # Principe : classes 1-3 et 6-7 en inconditionnel, classe 4 partitionnée
  # par le signe du solde (">0" actif circulant / "<0" passif circulant,
  # conditions appliquées dans le code), classe 5 = trésorerie directe.
  # Le contrôle "Cohérence Tréso" (controls.py) vérifie |TN − TN direct|.
  treso:
    ressources_stables:
      capitaux_propres: ["10", "11", "12", "13", "14"]
      # Résultat de l'exercice en cours (classes 6 et 7 si non clôturé) :
      # sans lui, le FRNG est faux de tout le résultat de l'exercice.
      resultat_en_cours: ["6", "7"]
      amort_dep: ["28", "29", "39", "49"]
      prov_risques: ["15"]
      dettes_financieres_mlt: ["16", "17"]
    emplois_stables:
      actif_immobilise_brut: ["20", "21", "22", "23", "24", "25", "26", "27"]
    actif_circulant_exploitation:
      stocks: ["30", "31", "32", "33", "34", "35", "36", "37", "38"]
      # Condition ">0" appliquée dans le code (419 créditeur → passif)
      creances_clients: ["41"]
      # Condition ">0" — fournisseurs débiteurs (40), créances sociales et
      # fiscales (42-44), c/c associés débiteurs (45), divers (46-47)
      autres_creances: ["40", "42", "43", "44", "45", "46", "47"]
      # Condition ">0" — comptes de régularisation actif (CCA 486 inclus)
      cca: ["48"]
    passif_circulant_exploitation:
      # Condition "<0" appliquée dans le code (fournisseurs débiteurs → actif)
      dettes_fournisseurs: ["40"]
      # Condition "<0" appliquée dans le code
      dettes_fiscales_sociales: ["42", "43", "44"]
      # Condition "<0" — clients créditeurs (419), c/c associés créditeurs
      # (45), divers (46-47)
      autres_dettes: ["41", "45", "46", "47"]
      # Condition "<0" — comptes de régularisation passif (PCA 487 inclus)
      pca: ["48"]
    tresorerie_directe:
      # Toute la classe 5, partitionnée par le signe du solde dans le code :
      # ">0" → trésorerie active (banques, caisse, VMP), "<0" → trésorerie
      # passive (CBC 519, banques créditrices 512, dépréciations 59)
      tresorerie_active: ["5"]
      tresorerie_passive: ["5"]

  aace:
    prefixes: ["606", "607", "608", "609", "61", "62"]

  # ---------------------------------------------------------------------------
  # EBIT (résultat d'exploitation, cerfa 2052)
  #
  # Représentation des exclusions ("709 sauf 7097", "75 sauf 755",
  # "65 sauf 655") : clés "*_exclusions" explicites. Un poste = somme des
  # comptes matchant ses préfixes MOINS la somme des comptes matchant les
  # préfixes de la clé "<poste>_exclusions" (sous-préfixes plus spécifiques).
  # Choix retenu car plus lisible et plus robuste que l'énumération
  # exhaustive des sous-préfixes inclus (ex. 7090…7096, 7098, 7099).
  #
  # Convention de signe (appliquée dans financial_engine.calculer_ebit) :
  # produits (classe 7, créditeurs) × -1 → positif ; charges (classe 6,
  # débitrices) telles quelles → positif ; EBIT = produits − charges.
  #
  # Les comptes de classe 6/7 hors exploitation (66x, 67x, 69x, 76x, 77x,
  # 78x sauf 781, 79x sauf 791, 655, 755) n'apparaissent PAS dans l'EBIT —
  # résultat financier/exceptionnel traité par le P&L détaillé (prompt 10).
  #
  # NOTE frais accessoires d'achats : 6081/6082/6091/6092 suivent les
  # matières premières et 6087/6097 les marchandises. Les autres
  # subdivisions 608x/609x (ex. 6085 droits de douane, 6088 frais divers)
  # ne sont PAS rattachées aux autres charges externes : convention de la
  # cible de référence GILAC validée par le cabinet (les rattacher
  # ajouterait ces frais aux charges d'exploitation).
  # ---------------------------------------------------------------------------
  ebit:
    produits_exploitation:
      # 7097 (RRR accordés sur ventes de marchandises, débiteur) inclus ici :
      # son solde débiteur se déduit automatiquement des ventes par le signe.
      ventes_marchandises: ["707", "7097"]
      production_vendue: ["701", "702", "703", "704", "705", "706",
                          "708", "709"]
      # 7097 déjà déduit des ventes de marchandises
      production_vendue_exclusions: ["7097"]
      production_stockee: ["713"]
      production_immobilisee: ["72"]
      subventions_exploitation: ["74"]
      reprises_transferts: ["781", "791"]
      autres_produits: ["75"]
      # 755 (quotes-parts de résultat) → hors exploitation
      autres_produits_exclusions: ["755"]
    charges_exploitation:
      achats_marchandises: ["607", "6087", "6097"]
      variation_stocks_marchandises: ["6037"]
      achats_matieres_premieres: ["601", "602", "6081", "6082",
                                  "6091", "6092"]
      variation_stocks_matieres: ["6031", "6032"]
      autres_charges_externes: ["604", "605", "606", "61", "62"]
      impots_taxes: ["63"]
      salaires_traitements: ["641", "644"]
      charges_sociales: ["645", "646", "647", "648", "649"]
      # Dotations en 4 lignes distinctes (cerfa 2052 : GA / GB / GC / GD)
      dotations_amortissements: ["6811", "6812"]
      dotations_dep_immobilisations: ["6816"]
      dotations_dep_actif_circulant: ["6817"]
      dotations_provisions: ["6815"]
      autres_charges: ["65"]
      # 655 (quotes-parts de résultat) → hors exploitation
      autres_charges_exclusions: ["655"]

  # ---------------------------------------------------------------------------
  # P&L détaillé (cerfa 2052/2053) — postes hors exploitation
  #
  # La partie exploitation est calculée en RÉSIDUEL des classes 6/7 : tout
  # compte 6x/7x non capturé par les postes ci-dessous est rattaché à
  # l'exploitation (financial_engine.calculer_pl_detaille). Le résultat net
  # du P&L est donc toujours égal à −(somme des classes 6 et 7), quel que
  # soit le plan de comptes du client.
  #
  # Convention de signe : chaque poste = −solde (produits créditeurs →
  # positif, charges débitrices → négatif).
  # ---------------------------------------------------------------------------
  pl_detaille:
    # 786/796 : reprises sur dépréciations et transferts de charges financiers
    produits_financiers: ["76", "786", "796"]
    charges_financieres: ["66", "686"]
    # 787/797 : reprises sur dépréciations et transferts de charges exceptionnels
    produits_exceptionnels: ["77", "787", "797"]
    charges_exceptionnelles: ["67", "687"]
    participation_salaries: ["691"]
    # IS = 695 (impôt sur les bénéfices) + 698 (intégration fiscale)
    # + 699 (produit de carry-back, créditeur — déduit automatiquement
    # par le signe). NE PAS omettre 698.
    impots_benefices: ["695", "698", "699"]
    # Quotes-parts de résultat sur opérations faites en commun
    # (655 charges, 755 produits) — exclues de l'EBIT, présentées entre le
    # résultat d'exploitation et le résultat financier dans la liasse 2052
    quotes_parts: ["655", "755"]

# =============================================================================
# ÉTATS DÉTAILLÉS (cerfa 2050 / 2051) — structures de présentation
# =============================================================================
# Sections à la RACINE du YAML (la section liasse_fiscale est figée à 5 clés
# par tests/test_mapping_liasse_fiscale_structure.py, et ses feuilles doivent
# être des listes — or ces structures portent des libellés).
#
# Chaque poste :
#   - prefixes       : préfixes sommés sans condition
#   - prefixes_cond  : préfixes sommés uniquement si le solde du compte
#                      vérifie la condition (">0" actif / "<0" passif) —
#                      reflet des comptes_bascule du bilan synthétique
#   - condition      : ">0" ou "<0" (obligatoire si prefixes_cond présent)
#
# Les partitions reprennent EXACTEMENT les listes du bilan synthétique
# (liasse_fiscale.bilan) raffinées par sous-poste : le total de l'Actif
# détaillé est donc strictement égal au Total Actif du bilan (contrôle
# _ctrl_coherence_actif_detaille).
# =============================================================================

